name: Daily Poll News Scraper

on:
  schedule:
    # UTC 時間 23:00 等於台灣時間 (UTC+8) 早上 7:00
    - cron: '0 23 * * *'
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊執行測試

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest

    steps:
    - name: 取得程式碼 (Checkout repository)
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行爬蟲與寄信
      env:
        # 從 GitHub Secrets 讀取帳號密碼
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python main.py
