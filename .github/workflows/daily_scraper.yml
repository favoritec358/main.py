name: Daily Poll News Scraper

on:
  schedule:
    - cron: '0 23 * * *'
workflow_dispatch: #

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 下載程式碼
      uses: actions/checkout@v4

    - name: 安裝 Python 與套件
      run: |
        python -m pip install --upgrade pip
        pip install feedparser

- name: 執行程式
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      # 告訴 GitHub：先走進 main.py 資料夾，再執行 mainV1.py
      run: python main.py/.github/workflows/mainV1.py
