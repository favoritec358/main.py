name: Daily Poll News Scraper

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: # 這次保證按鈕在左邊專屬分頁一定看得到！

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 抓取專案
      uses: actions/checkout@v4

    - name: 2. 準備 Python 環境
      uses: actions/setup-python@v5

    - name: 3. 安裝必備套件
      run: pip install feedparser

    - name: 4. 暴力鎖定路徑執行
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      # 不管它在哪個夾子，用萬能字元強行搜出來執行，看它怎麼迷路！
      run: python **/mainV1.py || python mainV1.py
