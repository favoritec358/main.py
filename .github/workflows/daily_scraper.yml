name: Daily Poll News Scraper

on:
  workflow_dispatch: # 只保留手動按鈕，方便我們 debug

jobs:
  debug-files:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 抓取專案
      uses: actions/checkout@v4

    - name: 🔍 照妖鏡：列出所有檔案（抓出你到底把 Python 檔藏哪了）
      run: |
        echo "=== 當前工作目錄 ==="
        pwd
        echo "=== 根目錄下的檔案清單 ==="
        ls -la
        echo "=== 全專案地毯式搜索所有 .py 檔案 ==="
        find . -name "*.py"
