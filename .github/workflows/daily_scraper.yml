name: Daily Poll News Scraper

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 取得程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5

    - name: 3. 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 新增這步：幫我們在黑底白字畫面上印出「到底有哪些檔案」，抓出它藏在哪裡
    - name: 🔍 Debug 檢查檔案位置
      run: |
        echo "=== 目前所在的絕對路徑 ==="
        pwd
        echo "=== 目前目錄下的所有檔案 ==="
        ls -R

    - name: 4. 執行爬蟲與寄信
      # 強制讓這一命令在虛擬機的最頂層根目錄執行
      working-directory: ${{ github.workspace }}
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      # 直接用最單純的檔名，配合 working-directory，它就不可能再疊加三次路徑了
      run: python main.py
