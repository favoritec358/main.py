name: Daily Poll News Scraper

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 抓取專案
      uses: actions/checkout@v4

    - name: 2. 準備 Python 環境
      uses: actions/setup-python@v5

    - name: 3. 安裝必備套件
      run: pip install feedparser

    - name: 4. 直奔老巢執行爬蟲
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      # 關鍵修正：直接去 .github/workflows 資料夾下執行 mainV1.py！
      run: python .github/workflows/mainV1.py
